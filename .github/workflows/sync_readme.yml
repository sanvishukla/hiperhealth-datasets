name: Sync README Datasets Table

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**/*.json'
  workflow_dispatch:

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Needs to be a personal access token if you want this commit to trigger other workflows, 
          # but GITHUB_TOKEN is fine for just updating the README.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -e .

      - name: Update README
        run: |
          hdatasets update-readme

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync README datasets table"
          file_pattern: "README.md"
